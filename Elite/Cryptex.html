<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Cryptex | Command Center</title>
   <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
   <style>
       /* === SYSTEM CORE === */
       *, *::before, *::after {
           box-sizing: border-box;
           margin: 0;
           padding: 0;
       }


       :root {
           --blue: #00aaff;
           --blue-dim: #0077cc;
           --blue-glow: rgba(0, 170, 255, 0.18);
           --blue-faint: rgba(0, 170, 255, 0.07);
           --navy: #000d1a;
           --black: #000508;
           --text: #a8d8f0;
           --text-dim: #4a7a9b;
           --sidebar-width: 250px;
       }


       body {
           margin: 0;
           background: var(--black);
           color: var(--text);
           font-family: 'Rajdhani', sans-serif;
           overflow: hidden;
           height: 100vh;
       }


       /* === GATE (Passcode Screen) === */
       #gate {
           position: fixed;
           inset: 0;
           background: var(--black);
           z-index: 9999;
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
           transition: opacity 0.5s ease;
       }


       #gate::before {
           content: '';
           position: absolute;
           inset: 0;
           background:
               repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,170,255,0.04) 40px),
               repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,170,255,0.04) 40px);
           pointer-events: none;
       }


       .gate-eyebrow {
           font-family: 'Share Tech Mono', monospace;
           font-size: 12px;
           letter-spacing: 6px;
           color: #5bb8e8;
           margin-bottom: 16px;
           text-transform: uppercase;
       }


       .gate-title {
           font-size: 88px;
           font-weight: 700;
           letter-spacing: 20px;
           color: #fff;
           text-transform: uppercase;
           line-height: 1;
           margin-bottom: 8px;
           text-shadow: 0 0 30px rgba(0,170,255,0.9), 0 0 60px rgba(0,170,255,0.4);
       }


       #entry {
           background: rgba(0, 170, 255, 0.12);
           border: 1px solid rgba(0, 170, 255, 0.4);
           color: #fff;
           padding: 14px 20px;
           font-size: 22px;
           font-family: 'Share Tech Mono', monospace;
           text-align: center;
           letter-spacing: 8px;
           outline: none;
           width: 320px;
           border-radius: 4px;
           box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
           transition: all 0.3s ease;
           margin-top: 20px;
       }


       #entry:focus {
           background: rgba(0, 170, 255, 0.2);
           border-color: var(--blue);
           box-shadow: 0 0 20px rgba(0, 170, 255, 0.3), inset 0 0 10px rgba(0, 170, 255, 0.1);
       }


       /* === MAIN UI LAYOUT === */
       #main-ui {
           display: none;
           height: 100vh;
           grid-template-columns: var(--sidebar-width) 1fr;
           grid-template-rows: 1fr;
           transition: grid-template-columns 0.4s cubic-bezier(0.4, 0, 0.2, 1);
       }


       #main-ui.collapsed {
           grid-template-columns: 0px 1fr;
       }


       /* === SIDEBAR === */
       .sidebar {
           background: #000810;
           border-right: 1px solid var(--blue-dim);
           display: flex;
           flex-direction: column;
           padding: 20px 15px;
           z-index: 10;
           box-shadow: 5px 0 15px rgba(0,0,0,0.5);
           overflow-y: auto;
           overflow-x: hidden;
           white-space: nowrap;
           transition: padding 0.4s cubic-bezier(0.4, 0, 0.2, 1), border 0.4s, box-shadow 0.4s;
       }


       #main-ui.collapsed .sidebar {
           padding-left: 0;
           padding-right: 0;
           border-right-color: transparent;
           box-shadow: none;
       }


       .sidebar::-webkit-scrollbar { width: 4px; }
       .sidebar::-webkit-scrollbar-thumb { background: var(--blue-dim); border-radius: 2px; }


       .nav-brand {
           font-weight: 700;
           font-size: 24px;
           letter-spacing: 4px;
           color: var(--blue);
           text-transform: uppercase;
           margin-bottom: 20px;
           position: sticky;
           top: 0;
           background: #000810;
           z-index: 2;
       }


       .nav-group { margin-bottom: 25px; width: 100%; }


       .nav-label {
           font-size: 10px;
           color: var(--text-dim);
           text-transform: uppercase;
           letter-spacing: 2px;
           margin: 0 0 12px 0;
           font-family: 'Share Tech Mono', monospace;
       }


       .btn {
           background: transparent;
           border: 1px solid rgba(0, 170, 255, 0.3);
           color: var(--text-dim);
           height: 38px;
           display: flex;
           align-items: center;
           justify-content: center;
           padding: 0 10px;
           border-radius: 3px;
           cursor: pointer;
           font-family: 'Rajdhani', sans-serif;
           font-weight: 600;
           font-size: 13px;
           letter-spacing: 2px;
           text-transform: uppercase;
           transition: all 0.15s ease;
           width: 100%;
           margin-bottom: 8px;
           outline: none;
       }


       .btn:hover {
           background: var(--blue-glow);
           border-color: var(--blue);
           color: var(--blue);
           box-shadow: 0 0 10px rgba(0, 170, 255, 0.2);
       }


       .btn-util {
           border-color: rgba(0, 170, 255, 0.5);
           color: #5599bb;
           width: auto;
           height: 30px;
           font-size: 11px;
           padding: 0 12px;
       }


       /* === VIEWPORT === */
       #viewport {
           display: flex;
           flex-direction: column;
           background: var(--black);
           position: relative;
           overflow: hidden;
       }


       .view-header {
           height: 48px;
           background: rgba(0, 13, 26, 0.9);
           border-bottom: 1px solid rgba(0, 170, 255, 0.2);
           display: flex;
           align-items: center;
           justify-content: space-between;
           padding: 0 15px;
           font-family: 'Share Tech Mono', monospace;
           font-size: 12px;
           position: relative; /* For absolute centering of clock */
       }


       .header-left { display: flex; align-items: center; gap: 10px; }
       .header-right { display: flex; align-items: center; }


       .view-footer {
           height: 32px;
           background: var(--navy);
           border-top: 1px solid var(--blue-dim);
           display: flex;
           gap: 20px;
           padding: 0 20px;
           align-items: center;
           font-family: 'Share Tech Mono', monospace;
           font-size: 10px;
           color: var(--text-dim);
       }


       .dot-live {
           display: inline-block;
           width: 6px;
           height: 6px;
           background: #00ff88;
           border-radius: 50%;
           margin-right: 8px;
           box-shadow: 0 0 8px #00ff88;
       }


       #content-area {
           flex-grow: 1;
           position: relative;
       }


       iframe {
           width: 100%;
           height: 100%;
           border: none;
           background: #000;
       }


       .welcome-screen {
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
           height: 100%;
           text-align: center;
       }


       .welcome-screen h2 {
           font-size: 56px;
           letter-spacing: 12px;
           color: var(--blue);
           text-transform: uppercase;
       }


       .welcome-line {
           width: 240px;
           height: 1px;
           background: linear-gradient(90deg, transparent, var(--blue-dim), transparent);
           margin: 20px auto 28px;
       }


       .sidebar-footer { margin-top: auto; padding-top: 20px; width: 100%; }
   </style>
</head>
<body>


   <div id="gate">
       <p class="gate-eyebrow">Secure Access Portal</p>
       <h1 class="gate-title">Cryptex</h1>
       <input type="text" id="entry" placeholder="ENTER PASSCODE" autocomplete="off" spellcheck="false">
   </div>


   <div id="main-ui">
       <aside class="sidebar" id="sidebar">
           <div class="nav-brand">Cryptex</div>
          
           <div class="nav-group">
               <p class="nav-label">Core Systems</p>
               <button class="btn" onclick="goHome()">Dashboard</button>
               <button class="btn" onclick="loadGames()">Game Modules</button>
           </div>


           <div class="nav-group">
               <p class="nav-label">External Links</p>
                <button class="btn" onclick="go('https://xylora.on.top.thenookfactory.com//')">Xylora</button>
                <button class="btn" onclick="go('https://axischurch.ldeazevedo.com//')">Axis</button>
                <button class="btn" onclick="go('https://larp.zinets.ca/onboarding/')">Cherri</button>
                <button class="btn" onclick="go('https://calculus.homework.biology.geography.lecture.bigrocktechnologies.com/')">Otonic</button>
                <button class="btn" onclick="go('https://jaydenmakesstuff.eleomedio-coach.hu/')">Vapor</button>
                <button class="btn" onclick="go('https://hiandhello4.eleomedio-coach.hu/?/')">Void Network</button>
                <button class="btn" onclick="go('https://inf41480.hydros.cl/')">Infamous</button>
                <button class="btn" onclick="go('https://435678.kavellewatches.com/')">Velara</button>
                <button class="btn" onclick="go('https://lsrelay-l.s3.amazonaws.com/index.html#/g')">Lucide</button>
                <button class="btn" onclick="go('https://s3.amazonaws.com/ghst/index.html')">Ghost</button>
                <button class="btn" onclick="go('https://tungtung.avtosnoj.si/')">Tung Tung</button>
                <button class="btn" onclick="go('https://bomboclat-wallahi.urpalestinian.tokeslaszlo.eu/')">Relic Network</button>
                <button class="btn" onclick="go('https://d1kdg4gl68lhf1.cloudfront.net/gxmes.html')">EDU Rocks</button>
                <button class="btn" onclick="go('https://gsyostos9t.ceifjskdj.fwh.is/')">Frogie's Arcade</button>
                <button class="btn" onclick="go('https://strawberry.avtosnoj.si')">Ford</button>
           </div>


           <div class="sidebar-footer">
               </div>
       </aside>


       <main id="viewport">
           <header class="view-header">
               <div class="header-left">
                   <button class="btn btn-util" onclick="toggleSidebar()">[ Menu ]</button>
                   <button id="ctx-full-btn" class="btn btn-util">Fullscreen</button>
               </div>


               <div class="current-time" id="clock" style="position: absolute; left: 50%; transform: translateX(-50%);">00:00:00</div>


               <div class="header-right">
                   <div class="status-indicator"><span class="dot-live"></span> System: Operational</div>
               </div>
           </header>


           <div id="content-area">
               <div id="welcome-msg" class="welcome-screen">
                   <p class="welcome-tag">Node 01 // Established</p>
                   <h2>Terminal</h2>
                   <div class="welcome-line"></div>
                   <div class="welcome-actions" style="display:flex; gap:10px;">
                       <button class="btn btn-util" onclick="launchPop()">Launch about:blank</button>
                       <button class="btn btn-util" onclick="launchBlob()">Launch Blob URL</button>
                   </div>
               </div>
               <iframe id="screen" style="display:none;" allowfullscreen></iframe>
           </div>


           <footer class="view-footer">
               <div class="footer-item">ENC: AES-256</div>
               <div class="footer-item">LOC: REMOTE_SRV</div>
               <div class="footer-item" style="color: var(--blue);">ID: CRYPT-0922</div>
           </footer>
       </main>
   </div>


   <script>
       const entry = document.getElementById('entry');
       const gate = document.getElementById('gate');
       const ui = document.getElementById('main-ui');
       const screen = document.getElementById('screen');
       const welcome = document.getElementById('welcome-msg');


       // Passcode Logic
       entry.addEventListener('input', () => {
           if (entry.value === 'Cryptex123') {
               gate.style.opacity = '0';
               setTimeout(() => {
                   gate.style.display = 'none';
                   ui.style.display = 'grid';
                   ui.classList.add('collapsed');
               }, 500);
           }
       });


       // Sidebar Logic
       function toggleSidebar() {
           ui.classList.toggle('collapsed');
       }


       function minimizeSidebar() {
           ui.classList.add('collapsed');
       }


       // Navigation
       function goHome() {
           screen.style.display = 'none';
           screen.src = 'about:blank';
           welcome.style.display = 'flex';
           ui.classList.remove('collapsed');
       }


       function go(url) {
           welcome.style.display = 'none';
           screen.style.display = 'block';
           screen.src = url;
           minimizeSidebar();
       }


       function loadGames() {
           welcome.style.display = 'none';
           screen.style.display = 'block';
           screen.srcdoc = '<h2 style="color:white; font-family:sans-serif; text-align:center; margin-top:20%;">Loading Game Modules...</h2>';
           minimizeSidebar();
           fetch('https://raw.githubusercontent.com/Subthemenis/Dashboard/refs/heads/main/index.html')
               .then(res => res.text())
               .then(html => { screen.srcdoc = html; })
               .catch(() => { screen.srcdoc = '<div style="color:red; text-align:center; margin-top:20%;">Error.</div>'; });
       }


       // Utilities
       function updateClock() {
           const now = new Date();
           document.getElementById('clock').textContent =
               now.getHours().toString().padStart(2, '0') + ':' +
               now.getMinutes().toString().padStart(2, '0') + ':' +
               now.getSeconds().toString().padStart(2, '0');
       }
       setInterval(updateClock, 1000);
       updateClock();


       function launchPop() {
           const win = window.open('about:blank', '_blank');
           if (win) {
               win.document.write('<!DOCTYPE html>' + document.documentElement.outerHTML);
               window.location.replace('https://google.com');
           }
       }


       function launchBlob() {
           const blob = new Blob(['<!DOCTYPE html>' + document.documentElement.outerHTML], { type: 'text/html' });
           window.open(URL.createObjectURL(blob), '_blank');
           window.location.replace('https://google.com');
       }


       // Fullscreen listener (ID maintained from sidebar for script compatibility)
       document.getElementById('ctx-full-btn').addEventListener('click', () => {
           if (!document.fullscreenElement) {
               document.documentElement.requestFullscreen();
           } else {
               if (document.exitFullscreen) {
                   document.exitFullscreen();
               }
           }
       });
   </script>
</body>
</html>
