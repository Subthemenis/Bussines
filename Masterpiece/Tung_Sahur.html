<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>TRIPLE T | SAHUR OS</title>
   <style>
       :root {
           --sahur-gold: #ffcc00;
           --dark-gold: #c29b00;
           --bg-black: #050505;
       }


       body, html {
           margin: 0; padding: 0;
           width: 100%; height: 100%;
           background: var(--bg-black);
           color: var(--sahur-gold);
           font-family: 'Impact', sans-serif;
           overflow: hidden;
       }


       /* --- GATE SCREEN --- */
       #gate {
           position: fixed;
           inset: 0;
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
           background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                       url('https://media.printables.com/media/prints/f93e3964-5fcd-4b5f-babd-666181369861/images/9717723_5707a8e8-b112-4ced-8490-84b34298042a_b7b59ebd-1401-46e4-961e-7e5ce8d636e2/thumbs/inside/1280x960/png/screenshot-2025-05-09-192850.webp');
           background-size: cover;
           z-index: 2000;
           border: 15px double var(--sahur-gold);
       }


       #entry {
           background: rgba(0,0,0,0.9);
           border: 3px solid var(--sahur-gold);
           color: var(--sahur-gold);
           padding: 15px;
           font-size: 32px;
           text-align: center;
           outline: none;
           width: 300px;
           text-transform: uppercase;
       }


       /* --- MAIN UI --- */
       #main-ui {
           display: none;
           flex-direction: column;
           height: 100vh;
       }


       header {
           background: #000;
           border-bottom: 3px solid var(--sahur-gold);
           padding: 5px 20px;
           display: flex;
           justify-content: space-between;
           align-items: center;
       }


       .header-left { display: flex; align-items: center; gap: 15px; }
       .mini-logo { height: 35px; }


       .tool-btn {
           background: #000;
           border: 1px solid var(--sahur-gold);
           color: var(--sahur-gold);
           padding: 6px 12px;
           cursor: pointer;
           font-family: monospace;
           font-size: 11px;
           margin-left: 5px;
       }


       .tool-btn:hover { background: var(--sahur-gold); color: #000; }
       .danger { border-color: #ff3333; color: #ff3333; }
       .danger:hover { background: #ff3333; color: #fff; }


       nav {
           display: flex;
           gap: 5px;
           padding: 8px;
           background: #111;
           overflow-x: auto;
           border-bottom: 1px solid var(--dark-gold);
       }


       .nav-link {
           background: var(--dark-gold);
           color: #000;
           border: none;
           padding: 8px 18px;
           cursor: pointer;
           font-family: 'Impact';
           white-space: nowrap;
       }


       /* --- VIEWPORT & CHARACTER --- */
       #viewport {
           flex-grow: 1;
           background: #000;
           position: relative;
           display: flex;
           align-items: center;
           justify-content: center;
           overflow: hidden;
       }


       .os-frame {
           width: 100%;
           height: 100%;
           border: none;
           position: absolute;
           top: 0; left: 0;
           z-index: 1;
           background: transparent;
       }


       .tung-character {
           max-width: 80%;
           max-height: 80%;
           z-index: 0;
           filter: drop-shadow(0 0 20px var(--sahur-gold));
           animation: breathe 3s infinite ease-in-out;
       }


       @keyframes breathe {
           0%, 100% { transform: scale(1); opacity: 0.8; }
           50% { transform: scale(1.05); opacity: 1; }
       }


       .footer {
           background: var(--sahur-gold);
           color: #000;
           padding: 3px 15px;
           font-family: monospace;
           font-weight: bold;
       }


       /* Hidden Input */
       #file-input { display: none; }
   </style>
</head>
<body>


   <div id="gate">
       <img src="https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/b_white/f_auto/q_auto/store/software/switch/70010000098678/3078cbf5b901860b00db096136f51361daa3d873ccdb3f4b346bc4200adf3642" style="width:200px; margin-bottom:20px;">
       <input type="text" id="entry" placeholder="TYPE SAHUR" autofocus>
   </div>


   <div id="main-ui">
       <header>
           <div class="header-left">
               <img src="https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/b_white/f_auto/q_auto/store/software/switch/70010000098678/3078cbf5b901860b00db096136f51361daa3d873ccdb3f4b346bc4200adf3642" class="mini-logo">
               <div>SAHUR_OS_v9 [ADMIN]</div>
           </div>
           <div class="toolbar">
               <input type="file" id="file-input" onchange="handleUpload(event)">
               <button class="tool-btn" onclick="triggerUpload()">UPLOAD</button>
               <button class="tool-btn" onclick="toggleFS()">FULLSCREEN</button>
               <button class="tool-btn" onclick="popAndClear()">POP-OUT</button>
               <button class="tool-btn danger" onclick="destroyFrame()">CLOSE</button>
           </div>
       </header>


       <nav id="nav-bar">
           <button class="nav-link" onclick="go('https://xylora.on.top.thenookfactory.com//')">Xylora</button>
           <button class="nav-link" onclick="go('https://axischurch.ldeazevedo.com//')">Axis</button>
           <button class="nav-link" onclick="go('https://larp.zinets.ca/onboarding/')">Cherri</button>
           <button class="nav-link" onclick="go('https://calculus.homework.biology.geography.lecture.bigrocktechnologies.com/')">Otonic</button>
           <button class="nav-link" onclick="go('https://jaydenmakesstuff.eleomedio-coach.hu/')">Vapor</button>
           <button class="nav-link" onclick="go('https://hiandhello4.eleomedio-coach.hu/?/')">Void Network</button>
           <button class="nav-link" onclick="go('https://inf41480.hydros.cl/')">Infamous</button>
           <button class="nav-link" onclick="go('https://435678.kavellewatches.com/')">Velara</button>
           <button class="nav-link" onclick="go('https://lsrelay-l.s3.amazonaws.com/index.html#/g')">Lucid</button>
           <button class="nav-link" onclick="go('https://s3.amazonaws.com/ghst/index.html')">Ghost</button>
           <button class="nav-link" onclick="go('https://tungtung.avtosnoj.si/')">Tung Tung</button>
           <button class="nav-link" onclick="go('https://bomboclat-wallahi.urpalestinian.tokeslaszlo.eu/')">Relic Network</button>
           <button class="nav-link" onclick="go('https://d1kdg4gl68lhf1.cloudfront.net/gxmes.html')">EDU Rocks</button>
           <button class="nav-link" onclick="go('https://ixllearning-bengali89.firebaseapp.com/')">Noah's butthole</button>
           <button class="nav-link" onclick="go('https://gsyostos9t.ceifjskdj.fwh.is/')">Frogie's arcade</button>
           <button class="nav-link" onclick="go('https://strawberry.avtosnoj.si')">Ford</button>
       </nav>


       <div id="viewport">
           <img src="https://play.google.com/store/apps/details?id=com.abdofakecall.tungsahur" class="tung-character" id="bg-char">
           <iframe id="screen" class="os-frame" src="about:blank"></iframe>
       </div>


       <div class="footer" id="os-status">SYSTEM READY</div>
   </div>


   <script>
       const entry = document.getElementById('entry');
       const gate = document.getElementById('gate');
       const ui = document.getElementById('main-ui');
       const viewport = document.getElementById('viewport');
       const status = document.getElementById('os-status');
       const bgChar = document.getElementById('bg-char');
       const fileInput = document.getElementById('file-input');


       entry.addEventListener('input', () => {
           if (entry.value.trim().toLowerCase() === "tung") {
               gate.style.display = "none";
               ui.style.display = "flex";
           }
       });


       function triggerUpload() {
           fileInput.click();
       }


       function handleUpload(event) {
           const file = event.target.files[0];
           if (file) {
               const url = URL.createObjectURL(file);
               go(url);
               status.innerText = "LOCAL FILE LOADED: " + file.name;
           }
       }


       function destroyFrame() {
           const oldFrame = document.getElementById('screen');
           if (oldFrame) oldFrame.remove();
          
           const newFrame = document.createElement('iframe');
           newFrame.id = 'screen';
           newFrame.className = 'os-frame';
           newFrame.src = 'about:blank';
           viewport.appendChild(newFrame);
          
           bgChar.style.display = "block";
           status.innerText = "VIEWPORT CLEARED";
       }


       function go(url) {
           const screen = document.getElementById('screen');
           screen.src = url;
           bgChar.style.display = "none";
           status.innerText = "ACTIVE: " + url;
       }


       function popAndClear() {
           const screen = document.getElementById('screen');
           if (screen.src && screen.src !== "about:blank") {
               window.open(screen.src, '_blank');
               destroyFrame();
           }
       }


       function toggleFS() {
           if (!document.fullscreenElement) {
               document.documentElement.requestFullscreen();
           } else {
               document.exitFullscreen();
           }
       }
   </script>
</body>
</html>
