<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pepsi | Command Center</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
--blue:#005cb4;
--blue2:#008cff;
--red:#e31b23;
--bg:#000814;
--panel:#00142b;
--text:#d8efff;
--dim:#73a7d6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Rajdhani,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at top,
rgba(0,92,180,.25),
transparent 40%),
linear-gradient(#000814,#00040a);

color:var(--text);
}

/* LOGIN */

#gate{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;

background:
radial-gradient(
circle at top,
rgba(0,92,180,.35),
transparent 35%
),

radial-gradient(
circle at bottom,
rgba(227,27,35,.18),
transparent 45%
),

linear-gradient(
180deg,
#000814,
#00040a
);

z-index:999;
transition:.5s;
overflow:hidden;
}

#gate::before{
content:"";

position:absolute;
width:700px;
height:700px;

border-radius:50%;

background:
conic-gradient(
from 0deg,
rgba(0,92,180,.12),
rgba(227,27,35,.10),
rgba(0,140,255,.12)
);

filter:blur(100px);

animation:spin 25s linear infinite;
}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

.logo{
position:relative;
z-index:2;

font-size:110px;
font-weight:700;
letter-spacing:12px;
line-height:1;

color:white;

text-shadow:
0 0 15px rgba(0,140,255,.9),
0 0 35px rgba(0,92,180,.7),
0 0 60px rgba(227,27,35,.35);

transform:scale(1.05);
}

url("https://raw.githubusercontent.com/Subthemenis/Images/refs/heads/main/Pepsi.png")
center/cover;

z-index:999;
transition:.5s;
}

.logo{
font-size:85px;
font-weight:700;
letter-spacing:10px;
color:white;

text-shadow:
0 0 15px rgba(0,140,255,.8),
0 0 35px rgba(227,27,35,.35);
}

.sub{

font-family:'Share Tech Mono';
font-size:12px;
letter-spacing:5px;
color:#9fcfff;

padding:8px 18px;

border-radius:999px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.06);

}

#entry{

width:320px;
padding:15px;

border-radius:14px;

border:1px solid rgba(255,255,255,.08);

background:rgba(0,92,180,.12);

backdrop-filter:blur(20px);

color:white;

font-size:18px;

text-align:center;

outline:none;

font-family:'Share Tech Mono';

letter-spacing:4px;

}

#entry:focus{

border-color:var(--red);

box-shadow:

0 0 20px rgba(227,27,35,.35);

}

/* MAIN */

#main{
display:none;
flex-direction:column;
height:100vh;
}

nav{

height:62px;

display:flex;

align-items:center;

padding:0 14px;

gap:14px;

background:
rgba(0,15,35,.95);

backdrop-filter:blur(20px);

border-bottom:
1px solid rgba(255,255,255,.06);

}

.brand{

font-size:24px;
font-weight:700;
letter-spacing:4px;

color:white;

text-shadow:
0 0 10px rgba(0,140,255,.8);

flex-shrink:0;

}

/* SCROLL */

.scroll{

display:flex;

gap:10px;

overflow-x:auto;

flex:1;

scroll-behavior:smooth;

cursor:grab;

scrollbar-width:thin;

scrollbar-color:#008cff #00142b;

}

.scroll::-webkit-scrollbar{

height:8px;

}

.scroll::-webkit-scrollbar-track{

background:#00142b;

border-radius:999px;

}

.scroll::-webkit-scrollbar-thumb{

background:
linear-gradient(
90deg,
#005cb4,
#e31b23
);

border-radius:999px;

}

.scroll::-webkit-scrollbar-thumb:hover{

background:
linear-gradient(
90deg,
#008cff,
#ff4040
);

}

/* BUTTONS */

.site-btn{

padding:10px 16px;

border:none;

border-radius:999px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.06);

color:var(--dim);

cursor:pointer;

transition:.25s;

white-space:nowrap;

font-weight:700;

flex-shrink:0;

}

.site-btn:hover{

transform:
translateY(-2px);

background:

linear-gradient(
135deg,
rgba(0,92,180,.95),
rgba(227,27,35,.95)
);

color:white;

box-shadow:
0 0 18px rgba(0,92,180,.4);

}

/* VIEWPORT */

#viewport{

flex:1;

position:relative;

background:black;

}

iframe{

width:100%;
height:100%;
border:none;

}

#welcome{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

gap:15px;

background:

radial-gradient(
circle,
rgba(0,92,180,.18),
transparent 60%
);

}

#welcome h1{

font-size:70px;

letter-spacing:10px;

color:white;

text-shadow:
0 0 20px rgba(0,92,180,.6);

}

.line{

width:280px;

height:2px;

background:

linear-gradient(
90deg,
transparent,
var(--blue),
var(--red),
transparent
);

}

#welcome p{

font-family:'Share Tech Mono';

font-size:14px;

letter-spacing:4px;

color:var(--dim);

}

</style>
</head>
<body>

<div id="gate">

<div class="sub">
GLOBAL PEPSI NETWORK
</div>

<div class="logo">
PEPSI
</div>

<input
id="entry"
placeholder="ENTER PASSCODE"
autocomplete="off">

</div>


<div id="main">

<nav>

<div class="brand">
PEPSI
</div>

<div class="scroll" id="sites"></div>

</nav>

<div id="viewport">

<div id="welcome">

<h1>PEPSI</h1>

<div class="line"></div>

<p>COMMAND CENTER READY</p>

</div>

<iframe
id="screen"
src="about:blank"></iframe>

</div>

</div>


<script>

const pages=[

["Xylora","https://xylora.on.top.thenookfactory.com/"],
["Axis","https://axischurch.ldeazevedo.com/"],
["Cherri","https://larp.zinets.ca/onboarding/"],
["Otonic","https://calculus.homework.biology.geography.lecture.bigrocktechnologies.com/"],
["Vapor","https://jaydenmakesstuff.eleomedio-coach.hu/"],
["Void Network","https://hiandhello4.eleomedio-coach.hu/"],
["Lucide","https://lsrelay-l.s3.amazonaws.com/index.html"],
["Ghost","https://s3.amazonaws.com/ghst/index.html"],
["Infamous","https://inf41480.hydros.cl/"],
["Velara","https://435678.kavellewatches.com/"],
["Tung Tung","https://tungtung.avtosnoj.si/"],
["Relic Network","https://bomboclat-wallahi.urpalestinian.tokeslaszlo.eu/"],
["EDU Rocks","https://d1kdg4gl68lhf1.cloudfront.net/gxmes.html"],
["Frogie's Arcade","https://gsyostos9t.ceifjskdj.fwh.is/"],
["Ford","https://strawberry.avtosnoj.si"]

];

const sites=document.getElementById("sites");
const screen=document.getElementById("screen");
const welcome=document.getElementById("welcome");

pages.forEach(([name,url])=>{

sites.innerHTML+=`

<button
class="site-btn"
onclick="openSite('${url}')">

${name}

</button>

`;

});


entry.oninput=()=>{

if(entry.value==="Pepsi123"){

gate.style.opacity="0";

setTimeout(()=>{

gate.style.display="none";

main.style.display="flex";

},500);

}

};


function openSite(url){

screen.src=url;

welcome.style.display="none";

}


/* drag scroll */

let down=false,start,left;

sites.addEventListener("mousedown",e=>{

down=true;

start=e.pageX;

left=sites.scrollLeft;

});

window.addEventListener("mouseup",()=>{

down=false;

});

sites.addEventListener("mousemove",e=>{

if(!down)return;

sites.scrollLeft=
left-(e.pageX-start);

});


sites.addEventListener("wheel",e=>{

e.preventDefault();

sites.scrollLeft+=e.deltaY;

},{passive:false});

</script>

</body>
</html>
