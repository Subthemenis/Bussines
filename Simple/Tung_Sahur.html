<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAHUR OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #060400;
            color: #ffcc00;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- GATE --- */
        #gate {
            position: fixed;
            inset: 0;
            background: #060400;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        #gate::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,204,0,0.03) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,204,0,0.03) 40px);
            pointer-events: none;
        }

        .gate-eyebrow {
            font-size: 11px;
            letter-spacing: 6px;
            color: #c29b00;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .gate-logo {
            width: 130px;
            margin-bottom: 18px;
            filter: drop-shadow(0 0 20px #ffcc00);
            animation: breathe 3s infinite ease-in-out;
        }

        .gate-title {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 68px;
            letter-spacing: 12px;
            color: #fff;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 6px;
            text-shadow: 0 0 30px rgba(255,204,0,0.9), 0 0 60px rgba(255,204,0,0.4);
        }

        .gate-sub {
            font-size: 11px;
            letter-spacing: 5px;
            color: #c29b00;
            margin-bottom: 28px;
            text-transform: uppercase;
        }

        #entry {
            background: rgba(255, 204, 0, 0.08);
            border: 1px solid rgba(255, 204, 0, 0.4);
            color: #fff;
            padding: 14px 20px;
            font-size: 20px;
            font-family: 'Share Tech Mono', monospace;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            width: 300px;
            border-radius: 3px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        #entry:focus {
            background: rgba(255, 204, 0, 0.14);
            border-color: #ffcc00;
            box-shadow: 0 0 20px rgba(255,204,0,0.2), inset 0 0 10px rgba(255,204,0,0.07);
        }

        #entry::placeholder { color: #4a3800; letter-spacing: 4px; }

        /* --- NAV BAR --- */
        nav {
            height: 55px;
            background: #080600;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 2px solid #ffcc00;
            gap: 8px;
            overflow-x: auto;
            flex-shrink: 0;
        }

        nav::-webkit-scrollbar { height: 3px; }
        nav::-webkit-scrollbar-thumb { background: #c29b00; }

        .brand {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 20px;
            letter-spacing: 3px;
            color: #ffcc00;
            text-shadow: 0 0 12px rgba(255,204,0,0.7);
            margin-right: 8px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn {
            background: rgba(255, 204, 0, 0.08);
            border: 1px solid #ffcc00;
            color: #ffcc00;
            padding: 7px 14px;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn:hover {
            background: rgba(255, 204, 0, 0.2);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.4);
        }

        .btn-exit {
            margin-left: auto;
            border-color: #ff4444;
            color: #ff4444;
            flex-shrink: 0;
        }

        .btn-exit:hover {
            background: rgba(255, 68, 68, 0.15);
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }

        /* --- CONTENT AREA --- */
        #content-area {
            flex-grow: 1;
            background: radial-gradient(circle at center, #120e00 0%, #060400 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* --- WELCOME BOX --- */
        .welcome-screen {
            max-width: 520px;
            padding: 40px;
            background: rgba(20, 15, 0, 0.7);
            border: 1px solid rgba(255, 204, 0, 0.3);
            border-radius: 6px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 0 40px rgba(255,204,0,0.05);
        }

        .welcome-char {
            width: 110px;
            filter: drop-shadow(0 0 20px #ffcc00);
            animation: breathe 3s infinite ease-in-out;
            margin-bottom: 18px;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 16px #ffcc00); }
            50% { transform: scale(1.06); filter: drop-shadow(0 0 30px #ffcc00); }
        }

        h2 {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 44px;
            letter-spacing: 8px;
            color: #ffcc00;
            text-shadow: 0 0 20px rgba(255,204,0,0.6);
            margin: 0 0 10px 0;
        }

        p {
            font-size: 13px;
            color: #7a6500;
            line-height: 1.8;
            letter-spacing: 1px;
        }

        .divider {
            width: 160px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c29b00, transparent);
            margin: 16px auto;
        }
    </style>
</head>
<body>

    <!-- GATE -->
    <div id="gate">
        <p class="gate-eyebrow">Secure Access Portal</p>
        <img src="https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/b_white/f_auto/q_auto/store/software/switch/70010000098678/3078cbf5b901860b00db096136f51361daa3d873ccdb3f4b346bc4200adf3642"
             class="gate-logo" alt="Tung Tung Sahur">
        <h1 class="gate-title">SAHUR OS</h1>
        <p class="gate-sub">v9 // Admin Terminal</p>
        <input type="text" id="entry" placeholder="TYPE SAHUR" autocomplete="off" spellcheck="false" autofocus>
    </div>

    <!-- NAV -->
    <nav id="main-nav" style="display:none;">
        <div class="brand">SAHUR_OS</div>
        <button class="btn" onclick="go('https://codehs.com/uploads/e38f4852992b68254fd76fafd1954bb4')">G Dash</button>
        <button class="btn" onclick="go('https://xylora.on.top.thenookfactory.com//')">Xylora</button>
        <button class="btn" onclick="go('https://axischurch.ldeazevedo.com//')">Axis</button>
        <button class="btn" onclick="go('https://larp.zinets.ca/onboarding/')">Cherri</button>
        <button class="btn" onclick="go('https://calculus.homework.biology.geography.lecture.bigrocktechnologies.com/')">Otonic</button>
        <button class="btn" onclick="go('https://jaydenmakesstuff.eleomedio-coach.hu/')">Vapor</button>
        <button class="btn" onclick="go('https://hiandhello4.eleomedio-coach.hu/?/')">Void Network</button>
        <button class="btn" onclick="go('https://inf41480.hydros.cl/')">Infamous</button>
        <button class="btn" onclick="go('https://435678.kavellewatches.com/')">Velara</button>
        <button class="btn" onclick="go('https://lsrelay-l.s3.amazonaws.com/index.html')">Lucide</button>
        <button class="btn" onclick="go('https://s3.amazonaws.com/ghst/index.html')">Ghost</button>
        <button class="btn" onclick="go('https://tungtung.avtosnoj.si/')">Tung Tung</button>
        <button class="btn" onclick="go('https://bomboclat-wallahi.urpalestinian.tokeslaszlo.eu/')">Relic</button>
        <button class="btn" onclick="go('https://d1kdg4gl68lhf1.cloudfront.net/gxmes.html')">EDU Rocks</button>
        <button class="btn" onclick="go('https://gsyostos9t.ceifjskdj.fwh.is/')">Frogie</button>
        <button class="btn" onclick="go('https://strawberry.avtosnoj.si')">Ford</button>
        <button class="btn btn-exit" onclick="window.location.reload()">Exit</button>
    </nav>

    <!-- CONTENT -->
    <div id="content-area" style="display:none;">
        <div id="welcome-msg" class="welcome-screen">
            <img src="https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/b_white/f_auto/q_auto/store/software/switch/70010000098678/3078cbf5b901860b00db096136f51361daa3d873ccdb3f4b346bc4200adf3642"
                 class="welcome-char" alt="Tung Tung Sahur">
            <h2>WELCOME</h2>
            <div class="divider"></div>
            <p>Select one of the buttons to start your session!</p>
        </div>
        <iframe id="screen"></iframe>
    </div>

    <script>
        const entry = document.getElementById('entry');
        const gate = document.getElementById('gate');

        entry.addEventListener('input', () => {
            if (entry.value.trim().toLowerCase() === 'tung') {
                gate.style.opacity = '0';
                setTimeout(() => {
                    gate.style.display = 'none';
                    document.getElementById('main-nav').style.display = 'flex';
                    document.getElementById('content-area').style.display = 'flex';
                }, 500);
            }
        });

        function go(url) {
            document.getElementById('welcome-msg').style.display = 'none';
            const screen = document.getElementById('screen');
            screen.style.display = 'block';
            screen.src = url;
        }
    </script>

</body>
</html>
